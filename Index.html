<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Layout</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;

      /* Interesting animated gradient background */
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #111827);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Title */
    header {
      margin-top: 40px;
      text-align: center;
    }

    header h1 {
      font-size: 6rem;
      letter-spacing: 2px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* Top centered nav */
    nav {
      margin-top: 25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 10px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
      align-items: center;
      justify-content: center;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 999px;
      transition: 0.25s ease;
    }

    nav a:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    /* Content placeholder */
    .content {
      margin-top: 80px;
      text-align: center;
      max-width: 700px;
      padding: 20px;
      background: rgba(0,0,0,0.25);
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <header>
    <h1>G Pass</h1>
  </header>

  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
    </ul>
  </nav>

  <div class="content">
    <h2>Welcome</h2>
    <p>This is a simple layout with a centered top selection bar and animated background.</p>
  </div>

</body>
</html>
